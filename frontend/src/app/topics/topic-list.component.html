<div class="page">
  <div class="container">
    <div class="hero">
      <h1>Choose a Topic</h1>
      <p>Pick a conversation topic and start speaking with your AI tutor.</p>
    </div>

    <div class="loading" *ngIf="loading">
      <div class="spinner" style="width:40px;height:40px;border-width:4px"></div>
    </div>

    <div class="grid" *ngIf="!loading">
      <div class="topic-card" *ngFor="let t of topics" (click)="start(t)">
        <div class="topic-title">{{ t.title }}</div>
        <div class="topic-desc">{{ t.description }}</div>
        <div class="topic-footer">
          <span class="badge badge--{{ t.level?.toLowerCase() ?? 'b1' }}"
            >{{ t.level ?? 'General' }}</span
          >
          <button
            class="btn btn--primary"
            style="padding:6px 16px;font-size:13px"
          >
            Start →
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
