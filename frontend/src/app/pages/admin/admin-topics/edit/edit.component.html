<div class="page">
  <div class="container">
    <nav class="breadcrumb">
      <a routerLink="/topics">Topics</a>
      <span class="sep" aria-hidden="true">/</span>
      <a routerLink="/admin/topics">Admin</a>
      <span class="sep" aria-hidden="true">/</span>
      <a routerLink="/admin/topics">Topics</a>
      <span class="sep" aria-hidden="true">/</span>
      <span class="current">Edit</span>
    </nav>

    @if (loading()) {
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading…</span>
      </div>
    }

    @if (!loading() && error()) {
      <p class="error">{{ error() }}</p>
      <p><a routerLink="/admin/topics" class="btn btn--secondary">Back to topics</a></p>
    }

    @if (!loading() && topic()) {
      <header class="hero">
        <div>
          <div class="d-flex gap-2 align-items-center justify-content-between">
            <h1>Edit topic</h1>
            <button class="btn btn--secondary d-flex align-items-center gap-1" (click)="openUnits()"><i class="bi bi-list-task fs-2xl" aria-hidden="true"></i> Units</button>
          </div>
          <p class="muted">Update title, description, and target level.</p>
        </div>
      </header>
      <app-topic-form-modal [embeddedTopic]="topic()!" />
      <!-- <app-learning-pack-editor [topicId]="topic()!.id" /> -->
    }
  </div>
</div>
