<div class="controls">
  <div class="controls-left">
    <div class="vu-bar" aria-hidden="true">
      <div class="vu-fill" [style.width.%]="vuLevel()"></div>
    </div>
    <button
      type="button"
      class="btn-record"
      [class.recording]="recording()"
      [class.speaking]="aiSpeaking()"
      (mousedown)="startRecording.emit()"
      (mouseup)="stopRecording.emit()"
      (touchstart)="startRecording.emit()"
      (touchend)="stopRecording.emit()"
      [disabled]="!canRecord()"
      [attr.aria-label]="
        recording()
          ? 'Recording… release to send'
          : canRecord()
            ? 'Hold to speak'
            : 'Wait for AI to greet you first'
      "
    >
      <span class="btn-record__icon">
        @if (recording()) {
          <i class="bi bi-stop-fill" aria-hidden="true"></i>
        } @else {
          <i class="bi bi-mic-fill" aria-hidden="true"></i>
        }
      </span>
    </button>
    <span class="controls-tip">
      @if (recording()) {
        <span class="controls-tip--recording">Recording…</span>
      } @else if (transcribing()) {
        <span class="controls-tip--transcribing">Transcribing…</span>
      } @else if (aiSpeaking()) {
        <span class="controls-tip--speaking">AI speaking…</span>
      } @else {
        Hold to speak
      }
    </span>
  </div>
  <div class="controls-right">
    <textarea
      class="chat-input"
      rows="3"
      [ngModel]="chatInput()"
      (ngModelChange)="chatInput.set($event)"
      (keydown.enter)="onChatEnterKey($event)"
      [placeholder]="messagesCount() === 0 ? 'Wait for AI to say hello…' : 'Type your reply…'"
      [disabled]="!connected() || messagesCount() === 0 || aiSpeaking()"
      title="Enter to send • Shift+Enter for a new line"
      aria-label="Message"
    ></textarea>
    <button
      type="button"
      class="btn btn--primary btn--sm chat-send"
      (click)="sendText.emit()"
      [disabled]="
        !connected() || messagesCount() === 0 || !chatInput().trim().length || aiSpeaking()
      "
      title="Send message"
    >
      <i class="bi bi-send-fill" aria-hidden="true"></i>
    </button>
  </div>
</div>
