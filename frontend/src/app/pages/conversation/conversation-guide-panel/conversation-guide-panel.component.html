<div
  class="conv-guide-backdrop"
  tabindex="-1"
  (click)="closeRequested.emit()"
  (keydown.enter)="closeRequested.emit()"
  (keydown.space)="closeRequested.emit(); $event.preventDefault()"
  aria-hidden="true"
></div>
<aside
  class="conv-guide-panel"
  aria-label="Guidance"
  [style.width.px]="sidebarDesktop() ? panelWidthPx() : null"
>
  <hr
    class="conv-guide-panel__resize-handle"
    aria-orientation="vertical"
    aria-label="Resize tips panel"
    title="Drag to resize"
    (pointerdown)="resizePointerDown.emit($event)"
  />
  <div class="conv-guide-panel__header">
    <h2 class="conv-guide-panel__title">{{ panelTitle() }}</h2>
    <div class="conv-guide-panel__header-actions">
      <button
        type="button"
        class="btn btn--ghost btn--icon conv-guide-panel__refresh"
        (click)="refreshRequested.emit()"
        aria-label="Refresh panel content"
        title="Get another version"
      >
        <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
      </button>
      <button
        type="button"
        class="btn btn--ghost btn--icon conv-guide-panel__close"
        (click)="closeRequested.emit()"
        aria-label="Close panel"
      >
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <div class="conv-guide-panel__message">
    <span class="conv-guide-panel__label">{{ sourceLabel() }}</span>
    <p class="conv-guide-panel__text">{{ displaySourceText(sourceText()) }}</p>
  </div>
  <div class="conv-guide-panel__tips">
    <span class="conv-guide-panel__label">{{ tipsLabel() }}</span>
    @if (loading()) {
      <p class="conv-guide-panel__loading">Đang tải…</p>
    } @else if (suggestions().length > 0) {
      <div class="conv-guide-panel__blocks">
        @for (s of suggestions(); track $index) {
          <div
            class="conv-guide-panel__block conv-guide-markdown"
            [innerHTML]="s | markdownHtml"
          ></div>
        }
      </div>
    } @else {
      <p class="conv-guide-panel__empty">Không có gợi ý.</p>
    }
  </div>
</aside>
