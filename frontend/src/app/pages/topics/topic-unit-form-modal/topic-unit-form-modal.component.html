<div class="modal-header">
  <h2 class="modal-title">Add roadmap step</h2>
  <button type="button" class="btn-close" aria-label="Close" (click)="cancel()">
    <i class="bi bi-x-lg" aria-hidden="true"></i>
  </button>
</div>
<div class="modal-body">
  @if (error) {
    <p class="form-error">{{ error }}</p>
  }
  <label class="field">
    <span>Sort order</span>
    <input type="number" class="input" [(ngModel)]="sortOrder" min="0" />
  </label>
  <label class="field">
    <span>Title</span>
    <input type="text" class="input" [(ngModel)]="title" maxlength="255" />
  </label>
  <label class="field">
    <span>Objective (for the learner)</span>
    <textarea class="input input--textarea" rows="3" [(ngModel)]="objective"></textarea>
  </label>
  <label class="field">
    <span>Tutor hint (for the AI)</span>
    <textarea class="input input--textarea" rows="3" [(ngModel)]="promptHint"></textarea>
  </label>
  <label class="field">
    <span>Min scored turns to auto-complete (optional)</span>
    <input type="number" class="input" [(ngModel)]="minTurns" min="1" placeholder="e.g. 3" />
  </label>
  <label class="field">
    <span>Min average overall score (optional, 0–10)</span>
    <input
      type="number"
      class="input"
      [(ngModel)]="minAvg"
      min="0"
      max="10"
      step="0.1"
      placeholder="e.g. 6"
    />
  </label>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn--ghost" [disabled]="saving" (click)="cancel()">
    Cancel
  </button>
  <button type="button" class="btn btn--primary" [disabled]="saving" (click)="submit()">
    {{ saving ? 'Creating…' : 'Create' }}
  </button>
</div>
