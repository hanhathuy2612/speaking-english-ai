<div class="page">
  <div class="container">
    <header class="hero hero--row">
      <div>
        <h1>Choose a topic</h1>
        <p>Pick a conversation topic and start speaking with your AI tutor.</p>
      </div>
      @if (account.isAdmin()) {
        <button type="button" class="btn btn--primary" (click)="openCreateForm()">
          <i class="bi bi-plus-lg" aria-hidden="true"></i> New topic
        </button>
      }
    </header>

    @if (loading()) {
      <div class="loading">
        <div class="spinner"></div>
        <span class="loading-text">Loading topics…</span>
      </div>
    }

    @if (!loading()) {
      <div class="grid">
        @for (t of topics(); track t.id) {
          <article
            class="topic-card"
            (click)="openRoadmap(t)"
            tabindex="0"
            (keydown.enter)="openRoadmap(t)"
            (keydown.space)="$event.preventDefault(); openRoadmap(t)"
          >
            <div class="topic-card__body">
              <div class="topic-card__header">
                <h2 class="topic-title">{{ t.title }}</h2>
                <button
                  type="button"
                  class="btn btn--ghost btn--icon topic-card__edit"
                  (click)="openEditForm(t); $event.stopPropagation()"
                  title="Edit topic"
                  aria-label="Edit topic"
                >
                  <i class="bi bi-pencil" aria-hidden="true"></i>
                </button>
              </div>
              <p class="topic-desc">{{ t.description }}</p>
              <span
                class="badge"
                [class.badge--a1]="(t.level ?? '').toLowerCase() === 'a1'"
                [class.badge--a2]="(t.level ?? '').toLowerCase() === 'a2'"
                [class.badge--b1]="(t.level ?? '').toLowerCase() === 'b1'"
                [class.badge--b2]="(t.level ?? '').toLowerCase() === 'b2'"
                [class.badge--c1]="(t.level ?? '').toLowerCase() === 'c1'"
                [class.badge--default]="
                  !t.level ||
                  !['a1', 'a2', 'b1', 'b2', 'c1'].includes((t.level || '').toLowerCase())
                "
              >
                {{ t.level ?? 'General' }}
              </span>
            </div>
            <div class="topic-card__action">
              <span class="topic-card__cta">Roadmap &amp; practice</span>
              <i class="bi bi-arrow-right topic-card__arrow" aria-hidden="true"></i>
            </div>
          </article>
        }
      </div>
    }
  </div>
</div>
