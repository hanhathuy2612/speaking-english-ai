<div class="page">
  <div class="container">
    <header class="hero">
      <div>
        <h1>Choose a topic</h1>
        <p>Pick a topic and practise IELTS Speaking with your AI tutor.</p>
      </div>
    </header>

    @if (loading()) {
      <div class="loading">
        <div class="spinner"></div>
        <span class="loading-text">Loading topics…</span>
      </div>
    }

    @if (!loading()) {
      <div class="grid">
        @for (t of topics(); track t.id) {
          <article
            class="topic-card"
            (click)="openRoadmap(t)"
            tabindex="0"
            (keydown.enter)="openRoadmap(t)"
            (keydown.space)="$event.preventDefault(); openRoadmap(t)"
          >
            <div class="topic-card__body">
              <div class="topic-card__header">
                <h2 class="topic-title">{{ t.title }}</h2>
              </div>
              <p class="topic-desc">{{ t.description }}</p>
              <span
                class="badge"
                [class.badge--ielts-low]="ieltsTier(t.level) === 'low'"
                [class.badge--ielts-mid]="ieltsTier(t.level) === 'mid'"
                [class.badge--ielts-strong]="ieltsTier(t.level) === 'strong'"
                [class.badge--ielts-expert]="ieltsTier(t.level) === 'expert'"
                [class.badge--default]="ieltsTier(t.level) === 'none'"
              >
                {{ topicLevelLabel(t) }}
              </span>
            </div>
            <div class="topic-card__action">
              <span class="topic-card__cta">Roadmap &amp; practice</span>
              <i class="bi bi-arrow-right topic-card__arrow" aria-hidden="true"></i>
            </div>
          </article>
        }
      </div>
    }
  </div>
</div>
