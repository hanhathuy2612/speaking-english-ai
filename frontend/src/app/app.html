<main class="app-main">
  @if (auth.isLoggedIn()) {
    <nav class="app-nav">
      <div>
        <a routerLink="/topics" class="app-nav__logo" routerLinkActive="active">
          <i class="bi bi-mic-fill app-nav__logo-icon" aria-hidden="true"></i>
          <span>SpeakAI</span>
        </a>
      </div>
      <div class="app-nav__links">
        <a routerLink="/topics" routerLinkActive="active">Topics</a>
        <a routerLink="/progress" routerLinkActive="active">Progress</a>
        @if (account.isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active">Admin</a>
        }
      </div>
      <div class="app-nav__user">
        <span class="app-nav__username">{{ auth.getUsername() }}</span>
        <button type="button" class="btn btn--ghost btn--sm" (click)="auth.logout()">Logout</button>
      </div>
    </nav>
  }

  <router-outlet></router-outlet>
</main>
