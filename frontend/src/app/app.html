<main
  class="app-main"
  [class.app-main--has-nav]="auth.isLoggedIn() && !hiddenNavbar()"
  [class.app-main--with-nav]="auth.isLoggedIn() && !hiddenNavbar() && mobileMenuOpen()"
  [class.app-main--conversation]="hiddenNavbar()"
>
  @if (auth.isLoggedIn() && !hiddenNavbar()) {
    <app-navbar
      [menuOpen]="mobileMenuOpen()"
      (menuOpenChange)="mobileMenuOpen.set($event)"
    ></app-navbar>
  }

  <div class="app-main__content">
    <router-outlet></router-outlet>
  </div>
</main>
